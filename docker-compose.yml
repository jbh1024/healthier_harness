services:
  mysql:
    image: mysql:8.0
    container_name: healthier-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: healthier
      MYSQL_USER: healthier
      MYSQL_PASSWORD: healthier
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:
