name: healthier
description: 학원 수강 신청 멀티 플랫폼 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^14.8.1

  # HTTP
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # 모델
  freezed_annotation: ^2.4.4

  # 보안 저장소
  flutter_secure_storage: ^9.2.3

  # 유틸
  intl: ^0.19.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 코드 생성
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  retrofit_generator: ^9.1.6
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
